    // ── Timeline Keyframe Editor ─────────────────────────────────────────
    const tlCanvas = document.getElementById('timeline-canvas');
    const tlCtx = tlCanvas.getContext('2d');
    const tlPanel = document.getElementById('timeline-panel');
    const tlTimeDisplay = document.getElementById('timeline-time');
    const tlZoomSlider = document.getElementById('timeline-zoom');

    let tlPlayhead = 0;        // current time position in ms
    let tlZoom = 100;          // pixels per second
    let tlScrollOffset = 0;    // horizontal scroll offset in px
    let tlSelectedKf = -1;     // index of selected keyframe (-1 = none)
    let tlDragging = false;    // currently dragging a keyframe
    let tlDragType = '';       // 'x' or 'y' lane

    let _tlLastW = 0, _tlLastH = 0;
    function tlResizeCanvas() {
        const rect = tlCanvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const w = Math.round(rect.width * dpr);
        const h = Math.round(rect.height * dpr);
        if (w !== _tlLastW || h !== _tlLastH) {
            _tlLastW = w;
            _tlLastH = h;
            tlCanvas.width = w;
            tlCanvas.height = h;
        }
        tlCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function tlTimeToX(time_ms) {
        return (time_ms / 1000) * tlZoom - tlScrollOffset;
    }

    function tlXToTime(x) {
        return ((x + tlScrollOffset) / tlZoom) * 1000;
    }

    function tlValueToY(value, lane, h) {
        // Map position value (0-500) to canvas Y within a lane
        // lane 'x': top half (0 to h/2), lane 'y': bottom half (h/2 to h)
        const laneTop = lane === 'x' ? 0 : h / 2;
        const laneH = h / 2;
        const margin = 12;
        const inner = laneH - margin * 2;
        // 0 maps to bottom of lane, 500 maps to top of lane
        return laneTop + margin + inner * (1 - value / 500);
    }

    function tlYToValue(y, lane, h) {
        const laneTop = lane === 'x' ? 0 : h / 2;
        const laneH = h / 2;
        const margin = 12;
        const inner = laneH - margin * 2;
        const v = (1 - (y - laneTop - margin) / inner) * 500;
        return Math.max(0, Math.min(500, v));
    }

    function tlGetLane(y, h) {
        return y < h / 2 ? 'x' : 'y';
    }

    function timelineHitTest(mx, my) {
        if (!state.recordedFade) return null;
        const kfs = state.recordedFade.keyframes;
        const rect = tlCanvas.getBoundingClientRect();
        const h = rect.height;
        const hitR = 8;
        for (let i = 0; i < kfs.length; i++) {
            const kf = kfs[i];
            const kx = tlTimeToX(kf.time_ms);
            // Check X lane diamond
            const kyX = tlValueToY(kf.x, 'x', h);
            if (Math.abs(mx - kx) < hitR && Math.abs(my - kyX) < hitR) {
                return { index: i, lane: 'x' };
            }
            // Check Y lane diamond
            const kyY = tlValueToY(kf.y, 'y', h);
            if (Math.abs(mx - kx) < hitR && Math.abs(my - kyY) < hitR) {
                return { index: i, lane: 'y' };
            }
        }
        return null;
    }

    function formatTlTime(ms) {
        const totalSec = ms / 1000;
        const mins = Math.floor(totalSec / 60);
        const secs = totalSec % 60;
        return mins + ':' + secs.toFixed(1).padStart(4, '0');
    }

    function drawTimeline() {
        if (tlPanel.style.display === 'none') return;
        tlResizeCanvas();
        const rect = tlCanvas.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;

        tlCtx.clearRect(0, 0, w, h);

        // Draw lane backgrounds
        // Top half (X lane) - slightly different shade
        tlCtx.fillStyle = 'rgba(0, 212, 255, 0.03)';
        tlCtx.fillRect(0, 0, w, h / 2);
        // Bottom half (Y lane)
        tlCtx.fillStyle = 'rgba(255, 0, 212, 0.03)';
        tlCtx.fillRect(0, h / 2, w, h / 2);

        // Lane divider
        tlCtx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        tlCtx.lineWidth = 1;
        tlCtx.beginPath();
        tlCtx.moveTo(0, h / 2);
        tlCtx.lineTo(w, h / 2);
        tlCtx.stroke();

        // Lane labels
        tlCtx.font = 'bold 11px sans-serif';
        tlCtx.fillStyle = 'rgba(0, 212, 255, 0.5)';
        tlCtx.fillText('X', 4, 14);
        tlCtx.fillStyle = 'rgba(255, 0, 212, 0.5)';
        tlCtx.fillText('Y', 4, h / 2 + 14);

        // Time markers along bottom
        const step = tlZoom >= 200 ? 0.5 : tlZoom >= 100 ? 1 : tlZoom >= 50 ? 2 : 5;
        const startTime = Math.floor(tlXToTime(0) / 1000 / step) * step;
        const endTime = tlXToTime(w) / 1000;
        tlCtx.font = '10px monospace';
        tlCtx.fillStyle = 'rgba(255, 255, 255, 0.25)';
        tlCtx.strokeStyle = 'rgba(255, 255, 255, 0.06)';
        tlCtx.lineWidth = 1;
        for (let t = Math.max(0, startTime); t <= endTime; t += step) {
            const x = tlTimeToX(t * 1000);
            if (x < 0 || x > w) continue;
            // Vertical grid line
            tlCtx.beginPath();
            tlCtx.moveTo(x, 0);
            tlCtx.lineTo(x, h);
            tlCtx.stroke();
            // Time label
            const mins = Math.floor(t / 60);
            const secs = Math.round(t % 60);
            tlCtx.fillText(mins + ':' + String(secs).padStart(2, '0'), x + 2, h - 3);
        }

        // Draw keyframes and curves
        if (state.recordedFade && state.recordedFade.keyframes.length > 0) {
            const kfs = state.recordedFade.keyframes;

            // Draw X curve (cyan)
            tlCtx.strokeStyle = 'rgba(0, 212, 255, 0.6)';
            tlCtx.lineWidth = 1.5;
            tlCtx.beginPath();
            for (let i = 0; i < kfs.length; i++) {
                const x = tlTimeToX(kfs[i].time_ms);
                const y = tlValueToY(kfs[i].x, 'x', h);
                if (i === 0) tlCtx.moveTo(x, y);
                else tlCtx.lineTo(x, y);
            }
            tlCtx.stroke();

            // Draw Y curve (magenta)
            tlCtx.strokeStyle = 'rgba(255, 0, 212, 0.6)';
            tlCtx.lineWidth = 1.5;
            tlCtx.beginPath();
            for (let i = 0; i < kfs.length; i++) {
                const x = tlTimeToX(kfs[i].time_ms);
                const y = tlValueToY(kfs[i].y, 'y', h);
                if (i === 0) tlCtx.moveTo(x, y);
                else tlCtx.lineTo(x, y);
            }
            tlCtx.stroke();

            // Draw keyframe diamonds
            for (let i = 0; i < kfs.length; i++) {
                const kf = kfs[i];
                const kx = tlTimeToX(kf.time_ms);
                if (kx < -10 || kx > w + 10) continue;

                // X diamond
                const yX = tlValueToY(kf.x, 'x', h);
                drawDiamond(kx, yX, i === tlSelectedKf && tlDragType !== 'y' ? 6 : 4,
                    i === tlSelectedKf && tlDragType !== 'y' ? '#00d4ff' : 'rgba(0, 212, 255, 0.8)');

                // Y diamond
                const yY = tlValueToY(kf.y, 'y', h);
                drawDiamond(kx, yY, i === tlSelectedKf && tlDragType !== 'x' ? 6 : 4,
                    i === tlSelectedKf && tlDragType !== 'x' ? '#ff00d4' : 'rgba(255, 0, 212, 0.8)');
            }
        }

        // Draw playhead
        const phX = tlTimeToX(tlPlayhead);
        if (phX >= 0 && phX <= w) {
            tlCtx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
            tlCtx.lineWidth = 1.5;
            tlCtx.setLineDash([4, 3]);
            tlCtx.beginPath();
            tlCtx.moveTo(phX, 0);
            tlCtx.lineTo(phX, h);
            tlCtx.stroke();
            tlCtx.setLineDash([]);

            // Playhead top marker
            tlCtx.fillStyle = '#fff';
            tlCtx.beginPath();
            tlCtx.moveTo(phX - 5, 0);
            tlCtx.lineTo(phX + 5, 0);
            tlCtx.lineTo(phX, 6);
            tlCtx.closePath();
            tlCtx.fill();
        }

        // Update time display
        tlTimeDisplay.textContent = formatTlTime(tlPlayhead);
    }

    function drawDiamond(cx, cy, size, color) {
        tlCtx.fillStyle = color;
        tlCtx.beginPath();
        tlCtx.moveTo(cx, cy - size);
        tlCtx.lineTo(cx + size, cy);
        tlCtx.lineTo(cx, cy + size);
        tlCtx.lineTo(cx - size, cy);
        tlCtx.closePath();
        tlCtx.fill();
        // Outline
        tlCtx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
        tlCtx.lineWidth = 0.5;
        tlCtx.stroke();
    }

    // Pointer events on timeline canvas
    function onTimelinePointerDown(e) {
        if (!state.recordedFade) return;
        const rect = tlCanvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const hit = timelineHitTest(mx, my);
        if (hit) {
            tlSelectedKf = hit.index;
            tlDragType = hit.lane;
            tlDragging = true;
            tlCanvas.setPointerCapture(e.pointerId);
        } else {
            // Set playhead
            tlSelectedKf = -1;
            tlPlayhead = Math.max(0, tlXToTime(mx));
            // Update mixer preview position
            tlScrubToPlayhead();
        }
        drawTimeline();
    }

    function onTimelinePointerMove(e) {
        if (!tlDragging || !state.recordedFade) return;
        const rect = tlCanvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const h = rect.height;

        const kf = state.recordedFade.keyframes[tlSelectedKf];
        if (!kf) return;

        // Update timing (horizontal)
        const newTime = Math.max(0, tlXToTime(mx));
        kf.time_ms = Math.round(newTime);

        // Update position value (vertical)
        if (tlDragType === 'x') {
            kf.x = Math.round(tlYToValue(my, 'x', h) * 10) / 10;
        } else {
            kf.y = Math.round(tlYToValue(my, 'y', h) * 10) / 10;
        }

        drawTimeline();
    }

    function onTimelinePointerUp(e) {
        if (tlDragging && state.recordedFade) {
            // Save reference to the keyframe we were dragging before sort
            const draggedKf = tlSelectedKf >= 0 ? state.recordedFade.keyframes[tlSelectedKf] : null;
            tlDragging = false;
            // Sort keyframes by time_ms
            state.recordedFade.keyframes.sort((a, b) => a.time_ms - b.time_ms);
            // Update selected index after sort
            if (draggedKf) {
                tlSelectedKf = state.recordedFade.keyframes.indexOf(draggedKf);
            }
            // Update duration_ms to match last keyframe
            const kfs = state.recordedFade.keyframes;
            if (kfs.length > 0) {
                state.recordedFade.duration_ms = kfs[kfs.length - 1].time_ms;
            }
            drawTimeline();
        }
        tlDragging = false;
        tlDragType = '';
    }

    function onTimelineContextMenu(e) {
        e.preventDefault();
        if (!state.recordedFade) return;
        const rect = tlCanvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const hit = timelineHitTest(mx, my);
        if (hit) {
            if (!confirm('Delete this keyframe?')) return;
            state.recordedFade.keyframes.splice(hit.index, 1);
            tlSelectedKf = -1;
            // Update duration
            const kfs = state.recordedFade.keyframes;
            state.recordedFade.duration_ms = kfs.length > 0 ? kfs[kfs.length - 1].time_ms : 0;
            drawTimeline();
        }
    }

    function onTimelineWheel(e) {
        e.preventDefault();
        const rect = tlCanvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const timeAtMouse = tlXToTime(mx);

        // Adjust zoom
        const delta = e.deltaY > 0 ? -10 : 10;
        tlZoom = Math.max(50, Math.min(400, tlZoom + delta));
        tlZoomSlider.value = tlZoom;

        // Adjust scroll to keep mouse position stable
        const newX = (timeAtMouse / 1000) * tlZoom;
        tlScrollOffset = Math.max(0, newX - mx);

        drawTimeline();
    }

    function tlScrubToPlayhead() {
        // Update mixer control point to match position at playhead time (visual only, no audio)
        if (!state.recordedFade || state.recordedFade.keyframes.length === 0) return;
        const kfs = state.recordedFade.keyframes;
        const t = tlPlayhead;

        if (t <= kfs[0].time_ms) {
            state.controlPoint.x = kfs[0].x;
            state.controlPoint.y = kfs[0].y;
        } else if (t >= kfs[kfs.length - 1].time_ms) {
            state.controlPoint.x = kfs[kfs.length - 1].x;
            state.controlPoint.y = kfs[kfs.length - 1].y;
        } else {
            for (let i = 0; i < kfs.length - 1; i++) {
                if (kfs[i].time_ms <= t && kfs[i + 1].time_ms >= t) {
                    const span = kfs[i + 1].time_ms - kfs[i].time_ms;
                    const frac = span > 0 ? (t - kfs[i].time_ms) / span : 0;
                    state.controlPoint.x = kfs[i].x + (kfs[i + 1].x - kfs[i].x) * frac;
                    state.controlPoint.y = kfs[i].y + (kfs[i + 1].y - kfs[i].y) * frac;
                    break;
                }
            }
        }
        markDirty();
    }

    // Wire up timeline canvas events
    tlCanvas.addEventListener('pointerdown', onTimelinePointerDown);
    tlCanvas.addEventListener('pointermove', onTimelinePointerMove);
    tlCanvas.addEventListener('pointerup', onTimelinePointerUp);
    tlCanvas.addEventListener('contextmenu', onTimelineContextMenu);
    tlCanvas.addEventListener('wheel', onTimelineWheel, { passive: false });

    // Zoom slider
    tlZoomSlider.addEventListener('input', () => {
        tlZoom = parseInt(tlZoomSlider.value);
        drawTimeline();
    });

    // Close button
    document.getElementById('timeline-close').addEventListener('click', () => {
        tlPanel.style.display = 'none';
    });

    // Add Keyframe button
    document.getElementById('btn-timeline-add').addEventListener('click', () => {
        if (!state.recordedFade) return;
        const newKf = {
            time_ms: Math.round(tlPlayhead),
            x: Math.round(state.controlPoint.x * 10) / 10,
            y: Math.round(state.controlPoint.y * 10) / 10,
        };
        state.recordedFade.keyframes.push(newKf);
        state.recordedFade.keyframes.sort((a, b) => a.time_ms - b.time_ms);
        // Update duration
        const kfs = state.recordedFade.keyframes;
        state.recordedFade.duration_ms = kfs[kfs.length - 1].time_ms;
        tlSelectedKf = kfs.indexOf(newKf);
        drawTimeline();
    });

    // Delete Selected button
    document.getElementById('btn-timeline-delete').addEventListener('click', () => {
        if (!state.recordedFade || tlSelectedKf < 0) return;
        state.recordedFade.keyframes.splice(tlSelectedKf, 1);
        tlSelectedKf = -1;
        const kfs = state.recordedFade.keyframes;
        state.recordedFade.duration_ms = kfs.length > 0 ? kfs[kfs.length - 1].time_ms : 0;
        drawTimeline();
    });

    // ── Animation loop ─────────────────────────────────────────────────

    const LERP_FACTOR = 0.15;
    let _needsRedraw = true;  // dirty flag for idle detection

    /** Mark canvas as needing a redraw. */
    function markDirty() { _needsRedraw = true; }

    /**
     * Continuous animation loop:
     * - Interpolates displayVolumes toward targetVolumes (smooth transitions)
     * - Only redraws when state has actually changed
     */
    function animationLoop() {
        let animating = false;

        // Combined lerp pass: volumes + fade-out + audio levels
        const allIds = new Set([
            ...Object.keys(state.targetVolumes),
            ...Object.keys(state.displayVolumes),
            ...Object.keys(state.audioLevels)
        ]);
        for (const id of allIds) {
            // Volume lerp
            if (id in state.targetVolumes) {
                const target = state.targetVolumes[id];
                const current = state.displayVolumes[id] || 0;
                if (Math.abs(target - current) > 0.001) {
                    state.displayVolumes[id] = current + (target - current) * LERP_FACTOR;
                    animating = true;
                } else {
                    state.displayVolumes[id] = target;
                }
            } else if (id in state.displayVolumes) {
                state.displayVolumes[id] *= (1 - LERP_FACTOR);
                if (state.displayVolumes[id] < 0.001) {
                    delete state.displayVolumes[id];
                    delete state.displayLevels[id];
                    delete state.lastSentVolumes[id];
                } else {
                    animating = true;
                }
            }
            // Level lerp
            if (id in state.audioLevels) {
                const target = state.audioLevels[id];
                const current = state.displayLevels[id] || 0;
                if (target > current) {
                    state.displayLevels[id] = target;
                    animating = true;
                } else {
                    const newVal = current + (target - current) * LERP_FACTOR;
                    if (Math.abs(newVal - current) > 0.001) animating = true;
                    state.displayLevels[id] = newVal;
                }
            }
        }

        // Preview playback
        if (state.previewing && state.recordedFade && !state.isDragging) {
            const elapsed = performance.now() - state.previewStartTime;
            const kfs = state.recordedFade.keyframes;
            if (kfs.length === 0) {
                state.previewing = false;
                btnPreview.textContent = 'Play Preview';
                btnRecord.disabled = false;
                btnClearRec.disabled = false;
            } else if (elapsed >= state.recordedFade.duration_ms) {
                state.previewing = false;
                btnPreview.textContent = 'Play Preview';
                btnRecord.disabled = false;
                btnClearRec.disabled = false;
                markDirty();
            } else {
                // Find surrounding keyframes
                let kfA = kfs[0], kfB = kfs[0];
                for (let i = 0; i < kfs.length - 1; i++) {
                    if (kfs[i].time_ms <= elapsed && kfs[i + 1].time_ms >= elapsed) {
                        kfA = kfs[i];
                        kfB = kfs[i + 1];
                        break;
                    }
                }
                if (elapsed >= kfs[kfs.length - 1].time_ms) {
                    kfA = kfB = kfs[kfs.length - 1];
                }
                const span = kfB.time_ms - kfA.time_ms;
                const t = span > 0 ? (elapsed - kfA.time_ms) / span : 0;
                state.controlPoint.x = kfA.x + (kfB.x - kfA.x) * t;
                state.controlPoint.y = kfA.y + (kfB.y - kfA.y) * t;
                updateVolumes();
                animating = true;
            }
        }

        // Auto-bounce — customizable patterns
        if (state.autoBounce !== 'off' && !state.isDragging && !state.previewing && !state.recording) {
            const n = state.devices.length;
            if (n >= 2) {
                const now = performance.now() / 1000;
                const speed = state.bounceSpeed;
                const radius = state.bounceRadius * RING_RADIUS;
                let targetX, targetY;

                if (state.bouncePattern === 'circle') {
                    const period = 4.0 / speed;
                    const t = (now % period) / period;
                    const angle = t * 2 * Math.PI - Math.PI / 2;
                    targetX = CENTER + radius * Math.cos(angle);
                    targetY = CENTER + radius * Math.sin(angle);

                } else if (state.bouncePattern === 'figure-8') {
                    const period = 6.0 / speed;
                    const t = (now % period) / period;
                    const angle = t * 2 * Math.PI;
                    targetX = CENTER + radius * Math.cos(angle);
                    targetY = CENTER + radius * 0.5 * Math.sin(2 * angle);

                } else if (state.bouncePattern === 'ping-pong') {
                    const period = 2.0 / speed;
                    const t = (now % period) / period;
                    const posA = devicePosition(0, n);
                    const posB = devicePosition(Math.floor(n / 2), n);
                    const frac = t < 0.5 ? t * 2 : 2 - t * 2;
                    const ease = frac * frac * (3 - 2 * frac);
                    targetX = posA.x + (posB.x - posA.x) * ease;
                    targetY = posA.y + (posB.y - posA.y) * ease;

                } else if (state.bouncePattern === 'random-wander') {
                    const s1 = Math.sin(now * 0.7 * speed) * 0.6;
                    const s2 = Math.sin(now * 1.3 * speed + 2.1) * 0.3;
                    const s3 = Math.sin(now * 0.4 * speed + 4.7) * 0.1;
                    const c1 = Math.cos(now * 0.5 * speed + 1.3) * 0.6;
                    const c2 = Math.cos(now * 1.1 * speed + 3.5) * 0.3;
                    const c3 = Math.cos(now * 0.3 * speed + 5.2) * 0.1;
                    targetX = CENTER + radius * (s1 + s2 + s3);
                    targetY = CENTER + radius * (c1 + c2 + c3);

                } else if (state.bouncePattern === 'beat-snap') {
                    const bps = state.bounceBPM / 60 * speed;
                    const beatPhase = (now * bps) % n;
                    const beatIndex = Math.floor(beatPhase);
                    const beatFrac = beatPhase - beatIndex;
                    const nextIndex = (beatIndex + 1) % n;
                    const posA = devicePosition(beatIndex, n);
                    const posB = devicePosition(nextIndex, n);
                    const ease = beatFrac * beatFrac * (3 - 2 * beatFrac);
                    targetX = posA.x + (posB.x - posA.x) * ease;
                    targetY = posA.y + (posB.y - posA.y) * ease;
                }

                if (targetX !== undefined) {
                    const lerpRate = state.bouncePattern === 'beat-snap' ? 0.15 : 0.08;
                    state.controlPoint.x += (targetX - state.controlPoint.x) * lerpRate;
                    state.controlPoint.y += (targetY - state.controlPoint.y) * lerpRate;
                    updateVolumes();
                    animating = true;
                }
            }
        }

        // Continuously animate when visualizer effects are active
        if (state.vizMode >= 1 && state.vizIntensity > 0.01) animating = true;

        if (animating || _needsRedraw) {
            drawMixer();
            _needsRedraw = false;
        }
        requestAnimationFrame(animationLoop);
    }

    // ── Initialization ────────────────────────────────────────────────

    // Initial fetch on page load (WS connect handler will push updates too).
    fetchDevices().then(() => updateVolumes());
    fetchRouterStatus();
    fetchFadeSlots();

    // No polling intervals needed — WebSocket push handles updates.
    // HTTP fallback polling is started automatically if WS disconnects.

    btnDJ.addEventListener('click', () => {
        updateCuePanel();
        updateLatencyPanel();
    });

    // Start the continuous animation loop.
    requestAnimationFrame(animationLoop);

    </script>
    {% endraw %}
</body>
